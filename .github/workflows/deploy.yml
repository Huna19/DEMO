
name: CI/CD Pipeline to AWS Beanstalk
# 1. Kích hoạt workflow mỗi khi có hành động push vào nhánh main
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
# Bước 1: Kéo code từ GitHub về máy ảo ngầm
      - name: Checkout source code
        uses: actions/checkout@v4

      # Bước 2: Khởi tạo Node.js để kiểm tra hoặc build nếu cần (Tùy chọn)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node_version: '20'

      # Bước 3: Tạo file nén .zip chứa code sạch (Bỏ qua các file rác và node_modules)
      - name: Generate deployment package
        run: zip -r deploy.zip . -x "*.git*" "node_modules/*" ".github/*"

      # Bước 4: Đăng nhập vào AWS bằng cặp chìa khóa bảo mật đã giấu
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets::ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets::SECRET_ACCESS_KEY }}
          aws-region: us-east-1 # Region bạn đang chạy hạ tầng

      # Bước 5: Đẩy file nén lên Beanstalk và ra lệnh kích hoạt
      - name: Deploy to AWS Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets::ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets::SECRET_ACCESS_KEY }}
          application_name: 'Ticketing-App' # Điền chính xác tên App trong code Terraform của bạn
          environment_name: 'Ticketing-Backend-env' # Điền chính xác tên Env trong code Terraform của bạn
          version_label: 'deploy-${{ github.sha }}' # Tự động đặt tên version theo mã hash của Git
          region: us-east-1
          deployment_package: deploy.zip
